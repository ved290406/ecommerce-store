<head>
  <title>Checkout</title>

<div class="checkout">
 <input id="name" placeholder="Name">

<label><input type="radio" name="payment" value="COD"> Cash on Delivery</label>
  <button onclick="placeOrder()">Place Order</button>
</div>

<script src="script.js"></script>
</body>
