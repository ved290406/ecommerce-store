<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f3f4f6;
padding:40px;
}

/* MAIN CONTAINER */

.checkout-container{
display:flex;
gap:30px;
max-width:1100px;
margin:auto;
}

/* LEFT SIDE FORM */

.checkout-box{
flex:2;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.checkout-box h2{
margin-bottom:20px;
}

/* INPUT */

.checkout-box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* PAYMENT */

.payment-option{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}


/* BUTTON */

.place-btn{
width:100%;
padding:14px;
background:#ff9900;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

.place-btn:hover{
background:#ffb84d;
}

/* ORDER SUMMARY */

.order-box{
flex:1;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
height:fit-content;
}

.order-box h3{
margin-bottom:15px;
}

/* PRODUCT */

.product{
display:flex;
align-items:center;
gap:10px;
margin:10px 0;
}

.product img{
width:50px;
height:50px;
object-fit:contain;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total{
font-size:20px;
font-weight:bold;
color:#b12704;
}

</style>

</head>

<body>

<div class="checkout-container">

<!-- LEFT FORM -->

<div class="checkout-box">

<h2>💳 Checkout</h2>

<input type="text" placeholder="Full Name" required>

<input type="text" placeholder="Address" required>

<input type="text" placeholder="Phone Number" required>

<h3 class="payment-title">Select Payment Method</h3>

<div class="payment-methods">

<label class="payment-card">
<input type="radio" name="payment" value="upi">
<span class="icon">📱</span>
<span>UPI Payment</span>
</label>

<label class="payment-card">
<input type="radio" name="payment" value="card">
<span class="icon">💳</span>
<span>Credit / Debit Card</span>
</label>

<label class="payment-card">
<input type="radio" name="payment" value="cod" checked>
<span class="icon">💵</span>
<span>Cash on Delivery</span>
</label>

</div>
<button class="place-btn" onclick="placeOrder()">Place Order</button>

</div>

<!-- RIGHT ORDER SUMMARY -->

<div class="order-box">

<h3>Your Items</h3>

<div id="orderItems"></div>

<hr style="margin:15px 0">

<div class="summary-row">
<span>Items</span>
<span id="itemCount">0</span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span>₹40</span>
</div>

<div class="summary-row total">
<span>Total</span>
<span id="totalPrice">₹0</span>
</div>

</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("orderItems");
let count = document.getElementById("itemCount");
let total = document.getElementById("totalPrice");

let totalPrice = 0;

cart.forEach(item => {

container.innerHTML += `
<div class="product">
<img src="${item.img}">
<div>
<p>${item.name}</p>
<b>₹${item.price}</b>
</div>
</div>
`;

totalPrice += Number(item.price);

});

count.innerText = cart.length;

total.innerText = "₹" + (totalPrice + 40);

function placeOrder(){

alert("Order Placed Successfully!");

localStorage.removeItem("cart");

window.location.href="success.html";

}

</script>

</body>
</html>
